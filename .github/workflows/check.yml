name: Klima price & stock monitor

on:
  schedule:
    # every 30 minutes (UTC). GitHub may delay this a few minutes under load.
    - cron: "*/30 * * * *"
  workflow_dispatch:        # lets you run it by hand from the Actions tab
    inputs:
      mode:
        description: "extra flag for monitor.py (e.g. --summary or --test)"
        required: false
        default: ""

# allow the job to push the updated state.json back to the repo
permissions:
  contents: write

concurrency:
  group: klima-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run monitor
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO:  ${{ secrets.EMAIL_TO }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER: ${{ secrets.NTFY_SERVER }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
        run: python monitor.py ${{ github.event.inputs.mode }}

      - name: Persist state
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "update state [skip ci]"
            git push
          else
            echo "No state change."
          fi
